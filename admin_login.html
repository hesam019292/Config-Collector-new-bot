<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Access — V2Ray Relay</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0B0E14;--panel:#121722;--line:#232B3A;--text:#E7ECF5;--muted:#7C8798;--bad:#F2545B;--accent:#5B8DEF;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;
       min-height:100vh; display:flex; align-items:center; justify-content:center;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:32px; max-width:380px; width:90%;}
  .icon{width:36px;height:36px;border-radius:9px;background:rgba(242,84,91,.12);border:1px solid rgba(242,84,91,.3);
        display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:16px;}
  h1{font-size:19px; margin:0 0 8px;}
  p{color:var(--muted); font-size:14px; line-height:1.6; margin:0 0 20px;}
  code{font-family:'IBM Plex Mono',monospace; background:#0B0E14; border:1px solid var(--line); padding:2px 6px; border-radius:5px; font-size:12.5px;}
  input{width:100%; background:#0B0E14; border:1px solid var(--line); border-radius:8px; color:var(--text);
        padding:10px 12px; font-family:'IBM Plex Mono',monospace; font-size:13px; margin-bottom:12px;}
  button{width:100%; background:var(--accent); color:#0B0E14; border:none; border-radius:8px; padding:11px; font-weight:700; cursor:pointer;}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <h1>Admin token required</h1>
    <p>Append your token as <code>?token=...</code> to the URL, or enter it below. The token is set via the <code>ADMIN_PANEL_TOKEN</code> environment variable on Railway.</p>
    <input id="tok" type="password" placeholder="Admin token">
    <button onclick="go()">Enter</button>
  </div>
  <script>
    function go(){
      const t = document.getElementById('tok').value.trim();
      if(t) window.location.href = '/admin?token=' + encodeURIComponent(t);
    }
    document.getElementById('tok').addEventListener('keydown', e => { if(e.key==='Enter') go(); });
  </script>
</body>
</html>
